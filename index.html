<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A simple viewer for Atlas Quest visual and audio assets." />
    <title>Atlas Quest — Asset Viewer</title>
    <link rel="stylesheet" href="styles.css?v=question-one-incorrect-1" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="Atlas Quest asset viewer home">
        <span class="brand-mark" aria-hidden="true">AQ</span>
        <span>
          <strong>Atlas Quest</strong>
          <small>Asset viewer</small>
        </span>
      </a>

      <div class="header-actions">
        <span class="asset-count" id="assetCount">01 / 10</span>
        <button class="icon-button" id="fitButton" type="button" aria-pressed="false" title="Show image at full size">
          <span aria-hidden="true">↗</span>
          <span class="button-label">Full size</span>
        </button>
      </div>
    </header>

    <main class="viewer-shell">
      <aside class="asset-rail" aria-label="Available assets">
        <div class="rail-heading">
          <p class="eyebrow">Collection</p>
          <h1>Mockups</h1>
        </div>

        <div class="asset-list" role="list">
          <button class="asset-card is-active" type="button" data-index="0" role="listitem" aria-current="true">
            <span class="thumbnail">
              <img src="assets/atlas-quest-course-home-ss.png" alt="" />
              <span class="asset-number">01</span>
            </span>
            <span class="asset-card-copy">
              <strong>Course home</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="1" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-map-ss.png" alt="" />
              <span class="asset-number">02</span>
            </span>
            <span class="asset-card-copy">
              <strong>Quest map</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="2" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-ui-ss.png" alt="" />
              <span class="asset-number">03</span>
            </span>
            <span class="asset-card-copy">
              <strong>Quest room</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="3" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-room-tour-ss.png" alt="" />
              <span class="asset-number">04</span>
            </span>
            <span class="asset-card-copy">
              <strong>Quest room tour</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="4" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-remember-activity-ss.png" alt="" />
              <span class="asset-number">05</span>
            </span>
            <span class="asset-card-copy">
              <strong>Remember activity</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="5" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-remember-quick-check-ss.png" alt="" />
              <span class="asset-number">06</span>
            </span>
            <span class="asset-card-copy">
              <strong>Remember quick check</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="6" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-remember-incorrect-answer-q1-ss.png" alt="" />
              <span class="asset-number">07</span>
            </span>
            <span class="asset-card-copy">
              <strong>Remember incorrect answer — question 1</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="7" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-remember-correct-answer-ss.png" alt="" />
              <span class="asset-number">08</span>
            </span>
            <span class="asset-card-copy">
              <strong>Remember correct answer</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="8" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-remember-question-2-ss.png" alt="" />
              <span class="asset-number">09</span>
            </span>
            <span class="asset-card-copy">
              <strong>Remember question 2</strong>
              <small>PNG · Visual</small>
            </span>
          </button>

          <button class="asset-card" type="button" data-index="9" role="listitem">
            <span class="thumbnail">
              <img src="assets/atlas-quest-remember-incorrect-answer-ss.png" alt="" />
              <span class="asset-number">10</span>
            </span>
            <span class="asset-card-copy">
              <strong>Remember incorrect answer — question 2</strong>
              <small>PNG · Visual</small>
            </span>
          </button>
        </div>

        <div class="audio-note">
          <span class="audio-icon" aria-hidden="true">♪</span>
          <div>
            <strong>Audio-ready</strong>
            <p>Add an audio file to an asset later and its player can live here.</p>
          </div>
        </div>
      </aside>

      <section class="stage" aria-labelledby="assetTitle">
        <div class="stage-toolbar">
          <div>
            <p class="eyebrow" id="assetType">Visual asset</p>
            <h2 id="assetTitle">Course home</h2>
          </div>
          <p class="hint"><kbd>←</kbd><kbd>→</kbd> to browse</p>
        </div>

        <div class="image-frame" id="imageFrame">
          <button class="nav-button previous" id="previousButton" type="button" aria-label="View previous asset">←</button>
          <figure>
            <div class="image-canvas is-course-active" id="imageCanvas">
              <img
                id="mainImage"
                src="assets/atlas-quest-course-home-ss.png"
                alt="Exercise Physiology course home with an Enter Course button"
              />
              <div class="course-ui-controls">
                <button
                  class="enter-course-hotspot"
                  type="button"
                  aria-label="Enter Course and open the Quest Room"
                  title="Enter Course"
                ></button>
              </div>
              <div class="map-hotspots" aria-hidden="true">
                <span class="map-hotspot bioenergetics" data-topic="Bioenergetics"></span>
                <span class="map-hotspot cardio" data-topic="Cardio"></span>
                <span class="map-hotspot neuromuscular" data-topic="Neuromuscular"></span>
                <span class="map-hotspot training" data-topic="Training"></span>
              </div>
              <div class="small-map-hotspots" aria-hidden="true">
                <span class="small-map-hotspot bio-1"></span>
                <span class="small-map-hotspot bio-2"></span>
                <span class="small-map-hotspot bio-3"></span>
                <span class="small-map-hotspot bio-4"></span>
                <span class="small-map-hotspot bio-5"></span>
                <span class="small-map-hotspot cardio-1"></span>
                <span class="small-map-hotspot cardio-2"></span>
                <span class="small-map-hotspot cardio-3"></span>
                <span class="small-map-hotspot cardio-4"></span>
                <span class="small-map-hotspot neuro-1"></span>
                <span class="small-map-hotspot neuro-2"></span>
                <span class="small-map-hotspot neuro-3"></span>
                <span class="small-map-hotspot neuro-4"></span>
                <span class="small-map-hotspot training-1"></span>
                <span class="small-map-hotspot training-2"></span>
                <span class="small-map-hotspot training-3"></span>
                <span class="small-map-hotspot training-4"></span>
              </div>
              <div class="map-ui-controls">
                <button
                  class="map-close-hotspot"
                  type="button"
                  aria-label="Close Quest Map"
                  title="Close Quest Map"
                ></button>
              </div>
              <div class="room-ui-controls">
                <button
                  class="room-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="tour-open-hotspot"
                  type="button"
                  aria-label="Summon HAaLOS for a room tour"
                  title="Start Room Tour"
                ></button>
                <button
                  class="map-open-hotspot"
                  type="button"
                  aria-label="Open Quest Map"
                  title="Open Quest Map"
                ></button>
              </div>
              <div class="tour-ui-controls">
                <button
                  class="tour-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room during the tour"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="tour-skip-hotspot"
                  type="button"
                  aria-label="Skip the HAaLOS room tour"
                  title="Skip Tour"
                ></button>
              </div>
              <div class="remember-frame-controls">
                <button
                  class="remember-frame-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room from the Remember activity"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="remember-frame-close-hotspot"
                  type="button"
                  aria-label="Close the Remember activity"
                  title="Close Remember Activity"
                ></button>
                <button
                  class="remember-quick-check-hotspot"
                  type="button"
                  aria-label="Start the Remember quick check"
                  title="Got it, quick check"
                ></button>
              </div>
              <div class="quick-check-controls">
                <button
                  class="quick-check-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room from the Remember quick check"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="quick-check-close-hotspot"
                  type="button"
                  aria-label="Close the Remember quick check"
                  title="Close Remember Quick Check"
                ></button>
                <button
                  class="long-lasting-reserve-answer-hotspot"
                  type="button"
                  aria-label="Answer a large, long-lasting reserve"
                  title="A large, long-lasting reserve"
                ></button>
                <button
                  class="tiny-amount-answer-hotspot"
                  type="button"
                  aria-label="Answer only a tiny amount"
                  title="Only a tiny amount"
                ></button>
              </div>
              <div class="question-one-incorrect-controls">
                <button
                  class="question-one-incorrect-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room from the question 1 incorrect-answer screen"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="question-one-incorrect-close-hotspot"
                  type="button"
                  aria-label="Close the question 1 incorrect-answer screen"
                  title="Close Remember Incorrect Answer"
                ></button>
                <button
                  class="question-one-incorrect-next-hotspot"
                  type="button"
                  aria-label="Continue from the question 1 incorrect answer to Remember question 2"
                  title="Next"
                ></button>
              </div>
              <div class="correct-answer-controls">
                <button
                  class="correct-answer-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room from the correct-answer screen"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="correct-answer-close-hotspot"
                  type="button"
                  aria-label="Close the Remember correct-answer screen"
                  title="Close Remember Correct Answer"
                ></button>
                <button
                  class="correct-answer-next-hotspot"
                  type="button"
                  aria-label="Continue to Remember quick-check question 2"
                  title="Next"
                ></button>
              </div>
              <div class="question-two-controls">
                <button
                  class="question-two-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room from Remember quick-check question 2"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="question-two-close-hotspot"
                  type="button"
                  aria-label="Close Remember quick-check question 2"
                  title="Close Remember Quick Check"
                ></button>
                <button
                  class="stores-oxygen-answer-hotspot"
                  type="button"
                  aria-label="Answer stores oxygen for later"
                  title="Stores oxygen for later"
                ></button>
              </div>
              <div class="incorrect-answer-controls">
                <button
                  class="incorrect-answer-exit-hotspot"
                  type="button"
                  aria-label="Exit the Quest Room from the incorrect-answer screen"
                  title="Exit Quest Room"
                ></button>
                <button
                  class="incorrect-answer-close-hotspot"
                  type="button"
                  aria-label="Close the Remember incorrect-answer screen"
                  title="Close Remember Incorrect Answer"
                ></button>
              </div>
              <div class="room-portals">
                <button class="portal-hotspot portal-one" type="button" data-portal="one" aria-label="Activate portal one"></button>
                <button class="portal-hotspot portal-two" type="button" data-portal="two" aria-label="Activate portal two"></button>
              </div>
              <div class="room-activities">
                <button
                  class="activity-hotspot remember-activity"
                  type="button"
                  aria-label="Open Remember guided reading activity"
                  title="Open Remember activity"
                ></button>
                <button
                  class="activity-hotspot understand-activity"
                  type="button"
                  aria-label="Open Understand activity"
                  title="Open Understand activity"
                ></button>
              </div>
              <div class="room-bottom-activities">
                <button
                  class="bottom-activity-hotspot bottom-remember-hotspot"
                  type="button"
                  aria-label="Open Remember activity from the bottom activity row"
                  title="Remember"
                ></button>
                <button
                  class="bottom-activity-hotspot bottom-understand-hotspot"
                  type="button"
                  aria-label="Activate Understand from the bottom activity row"
                  title="Understand"
                ></button>
              </div>
            </div>
          </figure>
          <button class="nav-button next" id="nextButton" type="button" aria-label="View next asset">→</button>
        </div>

        <footer class="asset-meta">
          <p id="assetDescription">The Exercise Physiology course overview and entry point into the first Quest Room.</p>
          <span id="fileName">atlas-quest-course-home-ss.png</span>
        </footer>
      </section>
    </main>

    <audio id="mapCircleInAudio" preload="auto" src="audio/game-play-sfx/AQ_GP_Large_Circle_IN.mp3?v=340174be"></audio>
    <audio id="mapCircleOutAudio" preload="auto" src="audio/game-play-sfx/AQ_GP_Large_Circle_OUT.mp3?v=bbe41ca4"></audio>
    <audio id="smallMapHoverAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Small_Map_Hover.mp3?v=e8047c64"></audio>
    <audio id="portalHoverAudio" preload="auto" loop src="audio/game-play-sfx/AQ_GP_Portal_Hover.mp3?v=2d2e9101"></audio>
    <audio id="portalTraverseAudio" preload="auto" src="audio/game-play-sfx/AQ_GP_Traverse_Portal_.mp3?v=be755722"></audio>
    <audio id="activityOpenAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Activity Open.mp3"></audio>
    <audio id="correctAnswerAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Correct_Answer.mp3"></audio>
    <audio id="incorrectAnswerAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Incorrect_Answer.mp3"></audio>
    <audio id="activityHoverAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Activity_and_Medium_Map_Hover.mp3?v=eea300a0"></audio>
    <audio id="activityHoverOutAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Unlocked_Activity_OUT.wav?v=f620fccb"></audio>
    <audio id="mapOpenAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Map_Open.mp3?v=53c050ca"></audio>
    <audio id="mapCloseAudio" preload="auto" src="audio/ui-sfx/AQ_UI_Map_Close.mp3?v=f74ed220"></audio>
    <audio id="ambientLayer1Audio" preload="auto" loop src="audio/ambient-soundscape /AQ_SS_Layer_1.mp3"></audio>
    <audio id="roomBeepsAudio" preload="auto" loop src="audio/ambient-soundscape /AQ_SS_Room_1_Beeps.mp3?v=quieter-room-beeps-1"></audio>
    <script src="script.js?v=question-one-incorrect-1"></script>
  </body>
</html>
